<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Slimste Onderweg</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, Roboto, Segoe UI, sans-serif;
    background: #0f1115;
    color: #f2f2f2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }
  h1 { font-size: 1.4rem; margin: 8px 0 4px; text-align: center; }
  .sub { color: #9aa0a6; font-size: 0.9rem; margin-bottom: 20px; text-align: center; }
  .card {
    width: 100%; max-width: 480px;
    background: #1a1d24; border-radius: 16px;
    padding: 20px; margin-bottom: 16px;
  }
  label { display: block; font-size: 0.85rem; color: #9aa0a6; margin: 10px 0 4px; }
  input[type=text] {
    width: 100%; padding: 10px 12px; border-radius: 10px;
    border: 1px solid #333; background: #0f1115; color: #fff; font-size: 1rem;
  }
  .players-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
  .chip {
    background: #262a33; padding: 6px 12px; border-radius: 999px;
    font-size: 0.9rem; display: flex; align-items: center; gap: 6px;
  }
  .chip button { background: none; border: none; color: #ff6b6b; cursor: pointer; font-size: 0.9rem; }
  .opt-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 6px 0 2px; }
  .opt {
    padding: 8px 12px; border-radius: 10px; border: 1px solid #333;
    background: #0f1115; color: #9aa0a6; font-size: 0.9rem; cursor: pointer; user-select: none;
  }
  .opt.on { border-color: #4f8cff; color: #fff; background: #1c2740; }
  button.primary {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    background: #4f8cff; color: #fff; font-size: 1.05rem; font-weight: 600;
    cursor: pointer; margin-top: 10px;
  }
  button.primary:disabled { opacity: 0.4; }
  button.secondary {
    padding: 10px 16px; border-radius: 10px; border: 1px solid #444;
    background: transparent; color: #fff; font-size: 0.95rem; cursor: pointer;
  }
  #game { display: none; width: 100%; max-width: 480px; }
  .round-banner {
    text-align: center; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase;
    color: #e3b341; margin-bottom: 2px; min-height: 1em;
  }
  .turn-banner {
    text-align: center; font-size: 1.1rem; font-weight: 600;
    color: #4f8cff; margin-bottom: 8px; min-height: 1.3em;
  }
  .question-text {
    font-size: 1.2rem; text-align: center; margin: 14px 0; min-height: 3em; white-space: pre-line;
  }
  .keywords { display: flex; flex-direction: column; gap: 6px; margin: 10px 0; }
  .kw {
    background: #0f1115; border: 1px solid #2a2e38; border-radius: 8px;
    padding: 8px 12px; font-size: 0.95rem; color: #666; letter-spacing: 1px;
  }
  .kw.found { color: #4caf50; border-color: #2e5d31; letter-spacing: normal; }
  .kw.revealed { color: #ff9d76; border-color: #5d3a2e; letter-spacing: normal; }
  .status-text {
    text-align: center; color: #9aa0a6; min-height: 1.4em; margin-bottom: 10px; font-size: 0.95rem;
  }
  .timer-bar {
    display: none; height: 6px; background: #262a33; border-radius: 3px;
    overflow: hidden; margin: 2px 0 10px;
  }
  .timer-fill { height: 100%; width: 100%; background: #4f8cff; }
  .transcript-box {
    background: #0f1115; border: 1px dashed #333; border-radius: 10px;
    padding: 10px 12px; min-height: 1.4em; text-align: center; color: #ddd;
    margin-bottom: 12px; font-size: 0.95rem;
  }
  .result-banner {
    text-align: center; font-weight: 700; font-size: 1.1rem; margin: 8px 0; min-height: 1.4em;
  }
  .result-correct { color: #4caf50; }
  .result-incorrect { color: #ff6b6b; }
  .scoreboard { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 14px 0; }
  .score-chip {
    background: #262a33; border-radius: 10px; padding: 8px 12px; text-align: center; min-width: 78px;
  }
  .score-chip.active { outline: 2px solid #4f8cff; }
  .score-chip .name { font-size: 0.8rem; color: #9aa0a6; }
  .score-chip .pts { font-size: 1.2rem; font-weight: 700; }
  .clocks { display: none; justify-content: center; gap: 16px; margin: 10px 0; }
  .clock { text-align: center; background: #262a33; border-radius: 12px; padding: 10px 18px; min-width: 110px; }
  .clock .name { font-size: 0.85rem; color: #9aa0a6; }
  .clock .time { font-size: 1.8rem; font-weight: 800; font-variant-numeric: tabular-nums; }
  .clock.running .time { color: #e3b341; }
  .clock.dead .time { color: #ff6b6b; }
  .btn-row { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
  .btn-row button { flex: 1 1 22%; white-space: nowrap; }
  .mic-indicator {
    width: 14px; height: 14px; border-radius: 50%; background: #444; display: inline-block; margin-right: 6px;
  }
  .mic-indicator.live { background: #ff4d4d; box-shadow: 0 0 8px 2px rgba(255,77,77,0.7); }
  .warning {
    background: #3a2a12; border: 1px solid #7a5a1e; color: #ffcf8a; border-radius: 10px;
    padding: 10px 12px; font-size: 0.85rem; margin-bottom: 16px; max-width: 480px;
  }
  .progress { text-align: center; color: #666; font-size: 0.8rem; margin-top: 10px; min-height: 1.2em; }
</style>
</head>
<body>

<h1>🚗 De Slimste Onderweg</h1>
<div class="sub">Alle rondes, volledig op stem — luister en antwoord hardop</div>

<div id="compatWarning" class="warning" style="display:none;"></div>

<div class="card" id="setup">
  <label>Spelernaam toevoegen</label>
  <input type="text" id="playerNameInput" placeholder="bv. Tim" maxlength="20">
  <button class="primary" id="addPlayerBtn" style="margin-top:8px;">Speler toevoegen</button>
  <div class="players-list" id="playersList"></div>

  <label>Puntentelling</label>
  <div class="opt-row" id="modeRow">
    <div class="opt on" data-mode="seconds">⏱ Seconden (zoals op tv)</div>
    <div class="opt" data-mode="points">🔢 Punten (simpel)</div>
  </div>

  <label>Rondes</label>
  <div class="opt-row" id="roundsRow">
    <div class="opt on" data-round="r369">3-6-9</div>
    <div class="opt on" data-round="opendeur">Open Deur</div>
    <div class="opt on" data-round="puzzel">De Puzzel</div>
    <div class="opt on" data-round="geheugen">Collectief Geheugen</div>
    <div class="opt on" data-round="ingelijst">Ingelijst</div>
    <div class="opt on" data-round="finale">Finale</div>
  </div>

  <button class="primary" id="startBtn" disabled>Start spel</button>
</div>

<div id="game">
  <div class="card">
    <div class="round-banner" id="roundBanner"></div>
    <div class="turn-banner" id="turnBanner">—</div>
    <div class="question-text" id="questionText"></div>
    <div class="keywords" id="keywordsBox"></div>
    <div class="clocks" id="clocksBox">
      <div class="clock" id="clockA"><div class="name"></div><div class="time"></div></div>
      <div class="clock" id="clockB"><div class="name"></div><div class="time"></div></div>
    </div>
    <div class="status-text" id="statusText"></div>
    <div class="timer-bar" id="timerBar"><div class="timer-fill" id="timerFill"></div></div>
    <div class="transcript-box" id="transcriptBox">&nbsp;</div>
    <div class="result-banner" id="resultBanner">&nbsp;</div>

    <div class="btn-row">
      <button class="secondary" id="repeatBtn">🔁 Herhaal</button>
      <button class="secondary" id="forceBtn">✅ Goed</button>
      <button class="secondary" id="passBtn">⏭ Pas</button>
      <button class="secondary" id="pauseBtn">⏸ Pauze</button>
      <button class="secondary" id="skipBtn">⏩ Skip</button>
    </div>
    <div class="progress" id="progressText"></div>
  </div>

  <div class="scoreboard" id="scoreboard"></div>
</div>

<script src="questions.js"></script>
<script src="match.js"></script>
<script>
(function () {
  // ---------- Compatibility ----------
  const SpeechRecognitionImpl = window.SpeechRecognition || window.webkitSpeechRecognition;
  const hasTTS = "speechSynthesis" in window;
  const compatWarning = document.getElementById("compatWarning");
  if (!SpeechRecognitionImpl || !hasTTS) {
    compatWarning.style.display = "block";
    compatWarning.textContent =
      "Deze browser ondersteunt geen spraakherkenning en/of spraaksynthese. " +
      "Gebruik Chrome op Android voor de beste ervaring.";
  }

  // ---------- Config ----------
  const START_SECONDS = 60;
  const VAL_369 = 10, VAL_OPENDEUR = 20, VAL_PUZZEL = 30, VAL_GEHEUGEN = 15, VAL_INGELIJST = 15;
  const N_369_QUESTIONS = 9; // 9 vragen, alleen 3, 6 en 9 leveren iets op
  const PUZZELS_PER_PLAYER = 2;
  const MAX_MISSES = 2; // opeenvolgende niet-gematchte antwoorden voor keyword-beurten

  // ---------- State ----------
  let players = [];        // { name, score }
  let mode = "seconds";    // "seconds" | "points"
  let enabledRounds = { r369: true, opendeur: true, puzzel: true, geheugen: true, ingelijst: true, finale: true };
  let activeListen = null; // { finish } — zodat knoppen kunnen ingrijpen
  let paused = false;
  let resumeQueue = [];
  let currentSlotHandler = null; // tik op een keyword-balkje = handmatig goed rekenen
  let overrideResolve = null;    // "Goed"-knop tijdens/na een fout-oordeel

  // ---------- DOM ----------
  const $ = (id) => document.getElementById(id);
  const roundBanner = $("roundBanner"), turnBanner = $("turnBanner"),
        questionText = $("questionText"), keywordsBox = $("keywordsBox"),
        statusText = $("statusText"), transcriptBox = $("transcriptBox"),
        resultBanner = $("resultBanner"), progressText = $("progressText"),
        scoreboard = $("scoreboard"), clocksBox = $("clocksBox"),
        timerBar = $("timerBar"), timerFill = $("timerFill");

  // ---------- Setup screen ----------
  const playerNameInput = $("playerNameInput"), addPlayerBtn = $("addPlayerBtn"),
        playersList = $("playersList"), startBtn = $("startBtn");

  function renderPlayers() {
    playersList.innerHTML = "";
    players.forEach((p, i) => {
      const chip = document.createElement("div");
      chip.className = "chip";
      chip.innerHTML = `${p.name} <button data-i="${i}">✕</button>`;
      playersList.appendChild(chip);
    });
    startBtn.disabled = players.length < 1;
  }
  addPlayerBtn.addEventListener("click", () => {
    const name = playerNameInput.value.trim();
    if (!name) return;
    players.push({ name, score: 0 });
    playerNameInput.value = "";
    renderPlayers();
    saveSetup();
  });
  playerNameInput.addEventListener("keydown", (e) => { if (e.key === "Enter") addPlayerBtn.click(); });
  playersList.addEventListener("click", (e) => {
    if (e.target.tagName === "BUTTON") { players.splice(Number(e.target.dataset.i), 1); renderPlayers(); saveSetup(); }
  });
  $("modeRow").addEventListener("click", (e) => {
    const el = e.target.closest(".opt"); if (!el) return;
    mode = el.dataset.mode;
    [...$("modeRow").children].forEach(c => c.classList.toggle("on", c === el));
    saveSetup();
  });
  $("roundsRow").addEventListener("click", (e) => {
    const el = e.target.closest(".opt"); if (!el) return;
    el.classList.toggle("on");
    enabledRounds[el.dataset.round] = el.classList.contains("on");
    saveSetup();
  });

  // Spelers en instellingen onthouden tussen sessies (geen namen opnieuw intikken)
  function saveSetup() {
    try {
      localStorage.setItem("dso_setup", JSON.stringify({
        names: players.map(p => p.name), mode, rounds: enabledRounds
      }));
    } catch (e) {}
  }
  function restoreSetup() {
    try {
      const s = JSON.parse(localStorage.getItem("dso_setup") || "null");
      if (!s) return;
      players = (s.names || []).map(n => ({ name: n, score: 0 }));
      if (s.mode === "points" || s.mode === "seconds") mode = s.mode;
      if (s.rounds) enabledRounds = Object.assign(enabledRounds, s.rounds);
      renderPlayers();
      [...$("modeRow").children].forEach(c => c.classList.toggle("on", c.dataset.mode === mode));
      [...$("roundsRow").children].forEach(c => c.classList.toggle("on", !!enabledRounds[c.dataset.round]));
    } catch (e) {}
  }
  restoreSetup();

  // ---------- Utils ----------
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  const wait = (ms) => new Promise(r => setTimeout(r, ms));

  // Kies n items die deze telefoon nog niet gehad heeft (localStorage).
  // Pas als de bank op is, wordt hij gereset en hergebruikt.
  function pickFresh(bankKey, bank, n) {
    n = Math.min(n, bank.length);
    let used = [];
    try { used = JSON.parse(localStorage.getItem("dso_used_" + bankKey) || "[]"); } catch (e) {}
    let avail = bank.map((_, i) => i).filter(i => !used.includes(i));
    if (avail.length < n) { used = []; avail = bank.map((_, i) => i); }
    const chosen = shuffle(avail).slice(0, n);
    try { localStorage.setItem("dso_used_" + bankKey, JSON.stringify(used.concat(chosen))); } catch (e) {}
    return chosen.map(i => bank[i]);
  }

  // Pauze: speak() en listenOnce() wachten hier tot er hervat wordt.
  function pauseGate() {
    if (!paused) return Promise.resolve();
    return new Promise(r => resumeQueue.push(r));
  }

  async function speak(text) {
    await pauseGate();
    return new Promise((resolve) => {
      if (!hasTTS) return resolve();
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "nl-NL";
      utter.rate = 1.0;
      let done = false;
      const finish = () => { if (!done) { done = true; resolve(); } };
      utter.onend = finish;
      utter.onerror = finish;
      // vangnet: onend blijft op sommige Android/Chrome-combo's uit
      const est = 4000 + text.length * 90;
      setTimeout(finish, est);
      window.speechSynthesis.speak(utter);
    });
  }

  // Luister één keer. Resolvet {transcripts, command} — command kan ook van knoppen komen.
  // showBar: aftel-balk tonen voor de tijdslimiet. Uit bij rondes waar je eigen
  // seconden al wegtikken (daar is de score zelf de klok) en in de finale.
  async function listenOnce(timeoutMs = 9000, showBar = true) {
    await pauseGate();
    return new Promise((resolve) => {
      if (!SpeechRecognitionImpl) {
        statusText.textContent = "Spraakherkenning niet beschikbaar.";
        return setTimeout(() => resolve({ transcripts: null, command: null }), 1500);
      }
      window.speechSynthesis.cancel();
      const recognition = new SpeechRecognitionImpl();
      recognition.lang = "nl-NL";
      recognition.interimResults = false;
      recognition.maxAlternatives = 3;

      let barTimer = null;
      if (showBar) {
        timerBar.style.display = "block";
        timerFill.style.width = "100%";
        timerFill.style.background = "#4f8cff";
        const barStart = Date.now();
        barTimer = setInterval(() => {
          const frac = Math.max(0, 1 - (Date.now() - barStart) / timeoutMs);
          timerFill.style.width = (frac * 100) + "%";
          if (frac < 0.3) timerFill.style.background = "#ff6b6b";
        }, 100);
      }

      let done = false;
      const finish = (result) => {
        if (done) return;
        done = true;
        activeListen = null;
        clearTimeout(timer);
        if (barTimer) clearInterval(barTimer);
        timerBar.style.display = "none";
        try { recognition.abort(); } catch (e) {}
        setMic(false);
        resolve(result);
      };
      activeListen = { finish };

      const timer = setTimeout(() => finish({ transcripts: null, command: null }), timeoutMs);

      recognition.onresult = (event) => {
        const results = event.results[0];
        const transcripts = [];
        for (let i = 0; i < results.length; i++) transcripts.push(results[i].transcript);
        transcriptBox.textContent = `Gehoord: "${transcripts[0]}"`;
        const command = transcripts.map(detectCommand).find(c => c) || null;
        finish({ transcripts, command });
      };
      recognition.onerror = () => finish({ transcripts: null, command: null });
      recognition.onend = () => finish({ transcripts: null, command: null });

      setMic(true);
      statusText.textContent = "Spreek je antwoord uit…";
      recognition.start();
    });
  }

  // Zoals op tv: buiten 3-6-9 tikt je klok terug terwijl je nadenkt (alleen secondenmodus).
  // De klok staat stil tijdens het voorlezen en tijdens pauze. Geen extra balk hier:
  // het scorebord zelf ís de klok.
  async function listenTimed(player, timeoutMs = 9000) {
    if (mode !== "seconds" || !player) return listenOnce(timeoutMs);
    const snap = player.score;
    let elapsed = 0;
    let last = Date.now();
    const ticker = setInterval(() => {
      const now = Date.now();
      if (!paused) elapsed += now - last;
      last = now;
      player.score = Math.max(0, snap - Math.round(elapsed / 1000));
      renderScoreboard(player);
    }, 250);
    const res = await listenOnce(timeoutMs, false);
    clearInterval(ticker);
    if (!paused) elapsed += Date.now() - last;
    player.score = Math.max(0, snap - Math.round(elapsed / 1000));
    renderScoreboard(player);
    return res;
  }

  function setMic(on) {
    statusText.innerHTML = on
      ? `<span class="mic-indicator live"></span>Aan het luisteren…`
      : statusText.textContent;
  }

  $("repeatBtn").addEventListener("click", () => { if (activeListen) activeListen.finish({ transcripts: null, command: "repeat" }); });
  $("passBtn").addEventListener("click", () => { if (activeListen) activeListen.finish({ transcripts: null, command: "pass" }); });
  // "Goed": tijdens het luisteren = direct goed; tijdens/kort na een fout-oordeel = alsnog goedkeuren.
  $("forceBtn").addEventListener("click", () => {
    if (activeListen) activeListen.finish({ transcripts: null, command: "force" });
    else if (overrideResolve) overrideResolve();
  });

  // Fout-oordeel uitspreken met een venster waarin "Goed" het oordeel omdraait.
  async function wrongVerdict(text) {
    let overridden = false;
    overrideResolve = () => { overridden = true; window.speechSynthesis.cancel(); };
    await speak(text);
    if (!overridden) await wait(900); // korte nadenktijd voor de jury
    overrideResolve = null;
    return overridden;
  }

  const pauseBtn = $("pauseBtn");
  pauseBtn.addEventListener("click", () => {
    paused = !paused;
    pauseBtn.textContent = paused ? "▶ Verder" : "⏸ Pauze";
    if (paused) {
      window.speechSynthesis.cancel();
      if (activeListen) activeListen.finish({ transcripts: null, command: "repeat" });
      statusText.textContent = "⏸ Gepauzeerd";
    } else {
      const q = resumeQueue; resumeQueue = [];
      q.forEach(r => r());
    }
  });

  // Skip: breekt het voorlezen af (uitleg, oordeel, tussenstand). speak() resolvet direct.
  $("skipBtn").addEventListener("click", () => { window.speechSynthesis.cancel(); });

  // Tik op een verborgen keyword-balkje om het handmatig goed te rekenen.
  keywordsBox.addEventListener("click", (e) => {
    const el = e.target.closest(".kw");
    if (!el || !currentSlotHandler || el.classList.contains("found") || el.classList.contains("revealed")) return;
    currentSlotHandler(Number(el.dataset.i));
  });

  // ---------- Score ----------
  function award(player, seconds) {
    if (mode === "seconds") player.score += seconds;
    else player.score += Math.max(1, Math.round(seconds / 10));
    renderScoreboard();
  }
  function scoreLabel() { return mode === "seconds" ? "sec" : "pt"; }
  function renderScoreboard(activePlayer) {
    scoreboard.innerHTML = "";
    players.forEach((p) => {
      const chip = document.createElement("div");
      chip.className = "score-chip" + (p === activePlayer ? " active" : "");
      chip.innerHTML = `<div class="name">${p.name}</div><div class="pts">${p.score} ${scoreLabel()}</div>`;
      scoreboard.appendChild(chip);
    });
  }

  // ---------- UI helpers ----------
  function clearStage() {
    questionText.textContent = "";
    keywordsBox.innerHTML = "";
    transcriptBox.innerHTML = "&nbsp;";
    resultBanner.innerHTML = "&nbsp;";
    resultBanner.className = "result-banner";
    statusText.textContent = "";
    progressText.textContent = "";
  }
  function showResult(ok, text) {
    resultBanner.textContent = text;
    resultBanner.className = "result-banner " + (ok ? "result-correct" : "result-incorrect");
  }
  function renderKeywordSlots(keywords, state) {
    // state[i]: "hidden" | "found" | "revealed"
    keywordsBox.innerHTML = "";
    keywords.forEach((kw, i) => {
      const div = document.createElement("div");
      div.className = "kw " + (state[i] === "hidden" ? "" : state[i]);
      div.dataset.i = i;
      div.textContent = state[i] === "hidden" ? "■".repeat(Math.min(14, Math.max(6, kw.label.length))) : kw.label;
      keywordsBox.appendChild(div);
    });
  }

  // ---------- Vraag met één antwoord ----------
  // Retourneert "correct" | "wrong" | "pass". timed = klok tikt tijdens het luisteren.
  async function askSingle(player, qText, answers, { spokenPrefix = "", timed = false } = {}) {
    questionText.textContent = qText;
    turnBanner.textContent = `${player.name} is aan de beurt`;
    renderScoreboard(player);
    let attemptsLeft = 2; // 1 herkansing bij storing/geen geluid
    await speak(`${spokenPrefix}${qText}`);
    while (true) {
      const res = timed ? await listenTimed(player) : await listenOnce();
      if (res.command === "repeat") { await speak(qText); continue; }
      if (res.command === "pass") return "pass";
      if (res.command === "force") return "correct"; // handmatig goedgekeurd
      if (!res.transcripts) {
        attemptsLeft--;
        if (attemptsLeft <= 0) return "pass"; // niets gehoord = behandelen als pas
        statusText.textContent = "Niets gehoord — probeer nog één keer.";
        continue;
      }
      return res.transcripts.some(t => isCorrectAnswer(t, answers)) ? "correct" : "wrong";
    }
  }

  // ---------- Keyword-beurt (Open Deur, Ingelijst) met overname ----------
  // Eén poging van één speler op een gedeelde state. Muteert state, kent punten toe.
  // Slot-taps werken op elk moment: direct goedkeuren, ook buiten het luisteren om.
  async function keywordAttempt(player, keywords, state, valuePer, spokenIntro, repeatText, maxMisses) {
    turnBanner.textContent = `${player.name} is aan de beurt`;
    renderScoreboard(player);
    renderKeywordSlots(keywords, state);
    currentSlotHandler = (i) => {
      if (state[i] !== "hidden") return;
      state[i] = "found";
      award(player, valuePer);
      renderKeywordSlots(keywords, state);
      showResult(true, `✅ ${keywords[i].label} (goedgekeurd)`);
      if (activeListen) activeListen.finish({ transcripts: null, command: "noop" });
    };
    if (spokenIntro) await speak(spokenIntro);
    let misses = 0;
    const remainingCount = () => state.filter(s => s === "hidden").length;
    while (remainingCount() > 0 && misses < maxMisses) {
      const res = await listenTimed(player);
      if (res.command === "noop") { misses = 0; continue; } // slot-tap al verwerkt
      if (res.command === "repeat") { await speak(repeatText); continue; }
      if (res.command === "pass") break;
      if (res.command === "force") { statusText.textContent = "Tik op het balkje van het antwoord dat gezegd is."; continue; }
      if (!res.transcripts) { misses++; continue; }
      const hits = [];
      for (const t of res.transcripts) {
        keywords.forEach((kw, i) => {
          if (state[i] === "hidden" && isCorrectAnswer(t, kw.variants)) { state[i] = "found"; hits.push(kw.label); }
        });
      }
      if (hits.length > 0) {
        misses = 0;
        hits.forEach(() => award(player, valuePer));
        renderKeywordSlots(keywords, state);
        const left = remainingCount();
        showResult(true, `✅ ${hits.join(", ")}`);
        await speak(`Juist: ${hits.join(", en ")}.` + (left > 0 ? ` Nog ${left}.` : " Alles gevonden!"));
      } else {
        misses++;
        showResult(false, "❌ Niet gevonden");
        if (misses < maxMisses) await speak("Nee. Probeer nog eens, of zeg: pas.");
      }
    }
  }

  // Hoofdbeurt + overname: bij "pas" of missers gaan de open antwoorden door
  // naar de volgende spelers, tot alles gevonden is of iedereen aan de beurt was.
  async function keywordRound(mainPlayer, keywords, valuePer, spokenIntro, repeatText) {
    const state = keywords.map(() => "hidden");
    renderKeywordSlots(keywords, state);
    await keywordAttempt(mainPlayer, keywords, state, valuePer, spokenIntro, repeatText, MAX_MISSES);
    if (players.length > 1) {
      const startIdx = players.indexOf(mainPlayer);
      for (let k = 1; k < players.length; k++) {
        const remaining = state.filter(s => s === "hidden").length;
        if (remaining === 0) break;
        const stealer = players[(startIdx + k) % players.length];
        await speak(`${stealer.name}, jij mag overnemen. Er ${remaining === 1 ? "staat nog één antwoord" : "staan nog " + remaining + " antwoorden"} open.`);
        await keywordAttempt(stealer, keywords, state, valuePer, null, repeatText, 1);
      }
    }
    // onthulling
    currentSlotHandler = null;
    const missed = keywords.filter((_, i) => state[i] === "hidden");
    keywords.forEach((_, i) => { if (state[i] === "hidden") state[i] = "revealed"; });
    renderKeywordSlots(keywords, state);
    if (missed.length > 0) await speak(`De overige antwoorden waren: ${missed.map(k => k.label).join(", ")}.`);
    await wait(600);
  }

  // ---------- Rondes ----------
  // 3-6-9: negen vragen, alleen vraag 3, 6 en 9 leveren iets op.
  // Goed antwoord = je houdt de beurt. Fout of "pas" = de volgende speler mag
  // dezelfde vraag proberen (antwoord wordt pas onthuld als iedereen geweest is).
  async function round369() {
    roundBanner.textContent = "Ronde · 3-6-9";
    clearStage();
    await speak(`De eerste ronde: drie, zes, negen. Negen vragen. Alleen vraag drie, zes en negen leveren ${mode === "seconds" ? "tien seconden" : "een punt"} op. Wie goed antwoordt, houdt de beurt. Bij fout of pas mag de volgende speler dezelfde vraag proberen.`);
    const qs = pickFresh("369", BANK_369, N_369_QUESTIONS);
    let turnIdx = 0;
    for (let i = 0; i < qs.length; i++) {
      const bonus = (i + 1) % 3 === 0;
      let candidate = turnIdx;
      for (let attempt = 0; attempt < players.length; attempt++) {
        clearStage();
        progressText.textContent = `Vraag ${i + 1} van ${qs.length}` + (bonus ? " · BONUSVRAAG" : "");
        const player = players[candidate];
        const prefix = attempt === 0
          ? (bonus ? `Vraag ${i + 1}, een bonusvraag. ${player.name}: ` : `Vraag ${i + 1}. ${player.name}: `)
          : `${player.name}, jij mag het proberen: `;
        let outcome = await askSingle(player, qs[i].q, qs[i].answers, { spokenPrefix: prefix });
        if (outcome === "wrong") {
          // antwoord niet verklappen: de volgende speler mag dezelfde vraag nog proberen
          showResult(false, "❌ Fout");
          const overridden = await wrongVerdict("Fout.");
          if (overridden) outcome = "correct";
        }
        if (outcome === "correct") {
          if (bonus) award(player, VAL_369);
          showResult(true, "✅ Correct!");
          await speak(bonus ? "Correct, en dat levert wat op! Jij mag door." : "Correct! Jij mag door.");
          turnIdx = candidate; // houdt de beurt voor de volgende vraag
          break;
        }
        // fout of pas → volgende speler mag dezelfde vraag proberen
        if (attempt === players.length - 1) {
          showResult(false, `❌ Antwoord: ${qs[i].answers[0]}`);
          await speak(`Niemand goed. Het antwoord was ${qs[i].answers[0]}.`);
          turnIdx = (turnIdx + 1) % players.length;
        } else {
          candidate = (candidate + 1) % players.length;
        }
      }
      await wait(400);
    }
  }

    await speak(`De Open Deur. Iedere speler krijgt een onderwerp met vier sleutelwoorden. Elk goed antwoord is ${mode === "seconds" ? "twintig seconden" : "twee punten"} waard. Zeg pas als je het niet meer weet — dan mogen de anderen overnemen.${klok}`);

      await keywordRound(players[i], t.keywords, VAL_OPENDEUR, `${players[i].name}. Jouw onderwerp: ${t.topic}. ${t.prompt}`, t.prompt);
    }

  async function roundPuzzel() {
    roundBanner.textContent = "Ronde · De Puzzel";
    clearStage();
    await speak(`De Puzzel. Je hoort vier aanwijzingen die allemaal naar één woord verwijzen. Raad het verband, goed voor ${mode === "seconds" ? "dertig seconden" : "drie punten"}. Zeg herhaal om de aanwijzingen opnieuw te horen.`);
    const puzzles = pickFresh("puzzel", BANK_PUZZEL, players.length * PUZZELS_PER_PLAYER);
    let pi = 0;
    for (let r = 0; r < PUZZELS_PER_PLAYER; r++) {
      for (let i = 0; i < players.length && pi < puzzles.length; i++, pi++) {
        clearStage();
        const player = players[i];
        const puz = puzzles[pi];
        questionText.textContent = puz.clues.map(c => "• " + c).join("\n");
        turnBanner.textContent = `${player.name} is aan de beurt`;
        renderScoreboard(player);
        progressText.textContent = `Puzzel ${pi + 1} van ${puzzles.length}`;
        const cluesSpoken = `De aanwijzingen zijn: ${puz.clues.join(". ")}. Wat is het verband?`;
        await speak(`${player.name}. ${cluesSpoken}`);
        let solved = false, attempts = 0;
        while (attempts < 2 && !solved) {
          const res = await listenTimed(player, 11000);
          if (res.command === "repeat") { await speak(cluesSpoken); continue; }
          if (res.command === "pass") break;
          if (res.command === "force") { solved = true; break; }
          if (!res.transcripts) { attempts++; continue; }
          attempts++;
          solved = res.transcripts.some(t => isCorrectAnswer(t, puz.answer.variants));
          if (!solved && attempts < 2) await speak("Nee, dat is het niet. Nog één poging.");
        }
        if (!solved) {
          // "Goed" tijdens de onthulling keurt alsnog goed
          solved = await wrongVerdict(`Het verband was: ${puz.answer.label}.`);
        }
        if (solved) {
          award(player, VAL_PUZZEL);
          showResult(true, `✅ ${puz.answer.label}`);
          await speak(`Juist! ${puz.answer.label}.`);
        } else {
          showResult(false, `❌ Het was: ${puz.answer.label}`);
        }
        await wait(500);
      }
    }
  }

  // Ingelijst: één lange lijst, om de beurt precies één antwoord.
  // Fout of pas = je ligt eruit voor deze vraag. Door tot iedereen uit is of de lijst vol.
  async function roundIngelijst() {
    roundBanner.textContent = "Ronde · Ingelijst";
    clearStage();
    await speak(`Ingelijst. Eén vraag met een lange lijst goede antwoorden. Om de beurt geef je precies één antwoord, goed voor ${mode === "seconds" ? "vijftien seconden" : "een punt of twee"}. Fout of pas? Dan lig je eruit. We spelen door tot iedereen eruit ligt of de lijst compleet is.`);
    const nQuestions = Math.min(2, Math.max(1, players.length));
    const subjects = pickFresh("ingelijst", BANK_INGELIJST, nQuestions);
    for (let si = 0; si < subjects.length; si++) {
      await ingelijstQuestion(subjects[si], si % players.length);
    }
  }

  async function ingelijstQuestion(s, startIdx) {
    clearStage();
    const keywords = s.keywords;
    const state = keywords.map(() => "hidden");
    questionText.textContent = `🖼 ${s.question}`;
    progressText.textContent = `Ingelijst · ${keywords.length} antwoorden`;
    renderKeywordSlots(keywords, state);
    const alive = players.map(() => true);
    let cur = startIdx;
    let manualIdx = -1; // slot-tap = goedgekeurd antwoord van de huidige speler
    currentSlotHandler = (i) => {
      if (state[i] !== "hidden") return;
      manualIdx = i;
      if (activeListen) activeListen.finish({ transcripts: null, command: "noop" });
    };
    await speak(`${s.question} Om de beurt één antwoord. ${players[startIdx].name} begint.`);
    while (state.some(st => st === "hidden") && alive.some(a => a)) {
      if (!alive[cur]) { cur = (cur + 1) % players.length; continue; }
      const player = players[cur];
      turnBanner.textContent = `${player.name} — één antwoord`;
      renderScoreboard(player);
      manualIdx = -1;
      let retries = 1;
      let outcome = null; // "hit" | "out"
      while (outcome === null) {
        const res = await listenTimed(player);
        if (manualIdx >= 0 && state[manualIdx] === "hidden") {
          state[manualIdx] = "found";
          award(player, VAL_INGELIJST);
          renderKeywordSlots(keywords, state);
          showResult(true, `✅ ${keywords[manualIdx].label} (goedgekeurd)`);
          manualIdx = -1;
          outcome = "hit";
          break;
        }
        manualIdx = -1;
        if (res.command === "repeat") { await speak(s.question); continue; }
        if (res.command === "force") { statusText.textContent = "Tik op het balkje van het gezegde antwoord."; continue; }
        if (res.command === "pass") { outcome = "out"; break; }
        if (!res.transcripts) {
          if (retries-- > 0) { statusText.textContent = "Niets gehoord — probeer nog één keer."; continue; }
          outcome = "out";
          break;
        }
        // precies één antwoord per beurt: alleen de eerste match telt
        let hitIdx = -1;
        for (const t of res.transcripts) {
          for (let i = 0; i < keywords.length; i++) {
            if (state[i] === "hidden" && isCorrectAnswer(t, keywords[i].variants)) { hitIdx = i; break; }
          }
          if (hitIdx >= 0) break;
        }
        if (hitIdx >= 0) {
          state[hitIdx] = "found";
          award(player, VAL_INGELIJST);
          renderKeywordSlots(keywords, state);
          showResult(true, `✅ ${keywords[hitIdx].label}`);
          await speak("Juist.");
          outcome = "hit";
        } else {
          showResult(false, "❌ Fout");
          // venster voor de jury: slot-tap of "Goed" tijdens dit oordeel
          const overridden = await wrongVerdict("Fout, of het staat niet in onze lijst.");
          if (manualIdx >= 0 && state[manualIdx] === "hidden") {
            state[manualIdx] = "found";
            award(player, VAL_INGELIJST);
            renderKeywordSlots(keywords, state);
            showResult(true, `✅ ${keywords[manualIdx].label} (goedgekeurd)`);
            manualIdx = -1;
            outcome = "hit";
          } else if (overridden) {
            statusText.textContent = "Tik op het balkje van het gezegde antwoord.";
          } else {
            outcome = "out";
          }
        }
      }
      if (outcome === "out") {
        alive[cur] = false;
        await speak(`${player.name} ligt eruit.`);
      }
      cur = (cur + 1) % players.length;
    }
    currentSlotHandler = null;
    const missed = keywords.filter((_, i) => state[i] === "hidden");
    keywords.forEach((_, i) => { if (state[i] === "hidden") state[i] = "revealed"; });
    renderKeywordSlots(keywords, state);
    if (missed.length === 0) {
      await speak("De hele lijst is gevonden!");
    } else if (missed.length > 6) {
      await speak(`Er bleven ${missed.length} antwoorden liggen. Ze staan op het scherm.`);
    } else {
      await speak(`Niet genoemd: ${missed.map(k => k.label).join(", ")}.`);
    }
    await wait(800);
  }

  // ---------- Finale ----------
  const clockEls = { a: $("clockA"), b: $("clockB") };
  function renderClocks(fin, runningIdx) {
    clocksBox.style.display = "flex";
    ["a", "b"].forEach((k, idx) => {
      const el = clockEls[k];
      el.querySelector(".name").textContent = fin[idx].player.name;
      el.querySelector(".time").textContent = Math.max(0, Math.ceil(fin[idx].ms / 1000));
      el.className = "clock" + (runningIdx === idx ? " running" : "") + (fin[idx].ms <= 0 ? " dead" : "");
    });
  }

  async function roundFinale() {
    roundBanner.textContent = "Finale";
    clearStage();
    if (players.length < 2) { await speak("Geen finale met één speler. Het spel zit erop!"); return; }
    const ranked = players.slice().sort((x, y) => y.score - x.score);
    const [p1, p2] = [ranked[0], ranked[1]];
    if (players.length > 2) {
      await speak(`De finale wordt gespeeld door ${p1.name} en ${p2.name}. De rest is uitgeschakeld.`);
    }

    if (mode === "points") return finalePoints(p1, p2);

    // Seconden-finale: klokken tellen af, goed sleutelwoord = beurt wisselt.
    const fin = [
      { player: p2, ms: Math.max(15, p2.score) * 1000 }, // laagste begint
      { player: p1, ms: Math.max(15, p1.score) * 1000 }
    ];
    await speak(`De finale. Jullie seconden zijn nu je levenslijn. Wie aan de beurt is, verliest tijd tijdens het nadenken. Een goed sleutelwoord geeft de beurt, en de klok, aan je tegenstander. Wie op nul staat, verliest. ${fin[0].player.name} begint.`);
    const subjects = pickFresh("finale", BANK_FINALE, Math.min(6, BANK_FINALE.length));
    let cur = 0; // index in fin
    let si = 0;
    outer: while (si < subjects.length) {
      const subject = subjects[si];
      const state = subject.keywords.map(() => "hidden");
      let manualHit = false;
      currentSlotHandler = (i) => {
        if (state[i] !== "hidden") return;
        state[i] = "found";
        renderKeywordSlots(subject.keywords, state);
        showResult(true, `✅ ${subject.keywords[i].label} (goedgekeurd)`);
        manualHit = true;
        if (activeListen) activeListen.finish({ transcripts: null, command: "noop" });
      };
      clearStage();
      questionText.textContent = subject.subject;
      renderKeywordSlots(subject.keywords, state);
      renderClocks(fin, cur);
      await speak(`Het onderwerp is: ${subject.subject}. Noem wat je weet.`);
      let consecutivePasses = 0;
      while (state.some(s => s === "hidden")) {
        if (manualHit) {
          manualHit = false;
          consecutivePasses = 0;
          cur = 1 - cur; // handmatig goedgekeurd antwoord geeft de beurt door
          await speak(`Goed gerekend. ${fin[cur].player.name}, jouw klok loopt.`);
          continue;
        }
        const active = fin[cur];
        turnBanner.textContent = `${active.player.name} — klok loopt!`;
        renderClocks(fin, cur);
        // klok loopt alleen tijdens luisteren/denken
        const tickStart = Date.now();
        active.msSnapshot = active.ms;
        const ticker = setInterval(() => {
          active.ms = active.msSnapshot - (Date.now() - tickStart);
          renderClocks(fin, cur);
          if (active.ms <= 0) { if (activeListen) activeListen.finish({ transcripts: null, command: "timeout" }); }
        }, 200);
        const res = await listenOnce(Math.min(10000, active.ms + 500), false);
        clearInterval(ticker);
        active.ms = Math.max(0, active.msSnapshot - (Date.now() - tickStart));
        renderClocks(fin, cur);
        if (active.ms <= 0) break outer;

        if (res.command === "noop") continue; // slot-tap; bovenaan de lus verwerkt
        if (res.command === "repeat") { await speak(`Het onderwerp is ${subject.subject}.`); continue; }
        if (res.command === "force") { statusText.textContent = "Tik op het balkje van het gezegde antwoord."; continue; }
        if (res.command === "pass" || res.command === "timeout" || !res.transcripts) {
          consecutivePasses++;
          if (consecutivePasses >= 2) {
            const missed = subject.keywords.filter((_, i) => state[i] === "hidden");
            if (missed.length) await speak(`Niet gevonden: ${missed.map(k => k.label).join(", ")}.`);
            break; // volgend onderwerp, zelfde speler blijft aan zet
          }
          await speak("De klok loopt door!");
          continue;
        }
        const hits = [];
        subject.keywords.forEach((kw, i) => {
          if (state[i] === "hidden" && res.transcripts.some(t => isCorrectAnswer(t, kw.variants))) {
            state[i] = "found"; hits.push(kw.label);
          }
        });
        if (hits.length > 0) {
          consecutivePasses = 0;
          renderKeywordSlots(subject.keywords, state);
          showResult(true, `✅ ${hits.join(", ")}`);
          cur = 1 - cur; // beurt (en klok) naar tegenstander
          await speak(`Juist: ${hits.join(", en ")}. ${fin[cur].player.name}, jouw klok loopt.`);
        } else {
          showResult(false, "❌");
          // klok liep al door tijdens deze poging; direct opnieuw luisteren
        }
      }
      si++;
    }
    currentSlotHandler = null;
    const loser = fin.find(f => f.ms <= 0) || fin.reduce((a, b) => (a.ms < b.ms ? a : b));
    const winner = fin.find(f => f !== loser);
    renderClocks(fin, -1);
    showResult(true, `🏆 ${winner.player.name} wint!`);
    await speak(`De klok van ${loser.player.name} staat op nul. ${winner.player.name} is de slimste onderweg!`);
  }

  async function finalePoints(p1, p2) {
    await speak(`De finale op punten. Drie onderwerpen, om de beurt antwoorden. Wie de meeste sleutelwoorden vindt, wint. ${p2.name} begint.`);
    const subjects = pickFresh("finale", BANK_FINALE, 3);
    const tally = new Map([[p1, 0], [p2, 0]]);
    let cur = p2;
    for (const subject of subjects) {
      const state = subject.keywords.map(() => "hidden");
      let manualHit = false;
      currentSlotHandler = (i) => {
        if (state[i] !== "hidden") return;
        state[i] = "found";
        tally.set(cur, tally.get(cur) + 1);
        renderKeywordSlots(subject.keywords, state);
        showResult(true, `✅ ${cur.name}: ${tally.get(cur)} (goedgekeurd)`);
        manualHit = true;
        if (activeListen) activeListen.finish({ transcripts: null, command: "noop" });
      };
      clearStage();
      questionText.textContent = subject.subject;
      renderKeywordSlots(subject.keywords, state);
      await speak(`Het onderwerp is: ${subject.subject}.`);
      let strikes = 0; // 2 missers na elkaar (beide spelers samen) = volgend onderwerp
      while (state.some(s => s === "hidden") && strikes < 2) {
        if (manualHit) {
          manualHit = false;
          strikes = 0;
          cur = cur === p1 ? p2 : p1;
          continue;
        }
        turnBanner.textContent = `${cur.name} is aan de beurt`;
        const res = await listenOnce();
        if (res.command === "noop") continue; // slot-tap; bovenaan de lus verwerkt
        if (res.command === "repeat") { await speak(`Het onderwerp is ${subject.subject}.`); continue; }
        if (res.command === "force") { statusText.textContent = "Tik op het balkje van het gezegde antwoord."; continue; }
        let hit = false;
        if (res.transcripts && res.command !== "pass") {
          subject.keywords.forEach((kw, i) => {
            if (state[i] === "hidden" && res.transcripts.some(t => isCorrectAnswer(t, kw.variants))) {
              state[i] = "found"; hit = true;
              tally.set(cur, tally.get(cur) + 1);
            }
          });
        }
        if (hit) {
          strikes = 0;
          renderKeywordSlots(subject.keywords, state);
          showResult(true, `✅ ${cur.name}: ${tally.get(cur)}`);
          await speak("Juist.");
        } else {
          strikes++;
          showResult(false, "❌");
          await speak("Nee.");
        }
        cur = cur === p1 ? p2 : p1; // beurt wisselt altijd
      }
      const missed = subject.keywords.filter((_, i) => state[i] === "hidden");
      if (missed.length) await speak(`Niet gevonden: ${missed.map(k => k.label).join(", ")}.`);
    }
    currentSlotHandler = null;
    const s1 = tally.get(p1), s2 = tally.get(p2);
    const winner = s1 === s2 ? null : (s1 > s2 ? p1 : p2);
    if (winner) {
      showResult(true, `🏆 ${winner.name} wint ${Math.max(s1, s2)} — ${Math.min(s1, s2)}`);
      await speak(`${winner.name} wint de finale met ${Math.max(s1, s2)} tegen ${Math.min(s1, s2)}!`);
    } else {
      showResult(true, `🤝 Gelijkspel: ${s1} — ${s2}`);
      await speak(`Gelijkspel! Jullie zijn allebei de slimste onderweg.`);
    }
  }

  // ---------- Spelverloop ----------
  async function announceStandings() {
    const ranked = players.slice().sort((a, b) => b.score - a.score);
    const lines = ranked.map(p => `${p.name}: ${p.score} ${mode === "seconds" ? "seconden" : "punten"}`);
    await speak(`De tussenstand. ${lines.join(". ")}.`);
  }

  async function runGame() {
    if (mode === "seconds") players.forEach(p => p.score = START_SECONDS);
    else players.forEach(p => p.score = 0);
    renderScoreboard();
    await speak(`Welkom bij De Slimste Onderweg! Er ${players.length === 1 ? "speelt één speler" : "spelen " + players.length + " spelers"} mee. Veel succes.`);
    const order = [
      ["r369", round369],
      ["opendeur", roundOpenDeur],
      ["puzzel", roundPuzzel],
      ["geheugen", roundGeheugen],
      ["ingelijst", roundIngelijst]
    ];
    for (const [key, fn] of order) {
      if (!enabledRounds[key]) continue;
      await fn();
      await announceStandings();
    }
    if (enabledRounds.finale && players.length >= 2) {
      await roundFinale();
    } else {
      const ranked = players.slice().sort((a, b) => b.score - a.score);
      showResult(true, `🏆 ${ranked[0].name} wint!`);
      await speak(`Eindstand: ${ranked[0].name} wint met ${ranked[0].score} ${mode === "seconds" ? "seconden" : "punten"}. Gefeliciteerd!`);
    }
    roundBanner.textContent = "Einde";
    turnBanner.textContent = "Spel afgelopen";
    progressText.textContent = "Herlaad de pagina voor een nieuw spel.";
  }

  startBtn.addEventListener("click", () => {
    if (players.length < 1) return;
    document.getElementById("setup").style.display = "none";
    document.getElementById("game").style.display = "block";
    runGame().catch(err => {
      console.error(err);
      statusText.textContent = "Er ging iets mis: " + err.message;
    });
  });
})();
</script>
</body>
</html>
